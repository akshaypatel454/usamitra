services:
  - type: web
    name: usa-mitra-mandal
    runtime: python
    region: ohio
    plan: starter
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: usa-mitra-mandal-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: EDITOR_ACCESS_PASSWORD
        sync: false
databases:
  - name: usa-mitra-mandal-db
    databaseName: usa_mitra_mandal
    user: usa_mitra_mandal
