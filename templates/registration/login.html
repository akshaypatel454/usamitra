<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fund Login</title>
    <style>
        :root {
            --bg: #f5f0e6;
            --surface: #fffdf8;
            --ink: #2d261f;
            --muted: #75685a;
            --line: #e6dccf;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(180deg, #f8f3e9 0%, var(--bg) 100%);
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
        }
        .card {
            width: min(440px, 100%);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(72, 51, 31, 0.05);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }
        p {
            color: var(--muted);
            margin: 0 0 18px;
        }
        form p {
            margin: 0 0 14px;
        }
        label {
            display: block;
            font-size: 0.92rem;
            margin-bottom: 5px;
            color: var(--muted);
        }
        input, button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--line);
            font: inherit;
            background: white;
        }
        button {
            background: var(--ink);
            color: white;
            cursor: pointer;
        }
        .errorlist {
            color: #c44536;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Fund Login</h1>
        <p>All members can sign in to view reports. Only the two assigned editors can change records.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
