{% extends "core/base.html" %}

{% block content %}
<h1 class="page-title">{{ page_title }}</h1>
<div class="grid two">
    <div class="card">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">{{ submit_label }}</button>
        </form>
    </div>
    <div class="card">
        <h2>What this does</h2>
        <p>Creates the same interest payout for every active member.</p>
    </div>
</div>
{% endblock %}
