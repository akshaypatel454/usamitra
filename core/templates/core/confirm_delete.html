{% extends "core/base.html" %}

{% block content %}
<h1 class="page-title">{{ page_title }}</h1>
<div class="card">
    <p>{{ description }}</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm Delete</button>
    </form>
    <p><a href="{{ cancel_url }}">Cancel</a></p>
</div>
{% endblock %}
